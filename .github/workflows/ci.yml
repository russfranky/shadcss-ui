name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build framework
        run: npm run build

      - name: Consistency + markup guards
        run: npm run check

  a11y:
    runs-on: ubuntu-latest
    needs: build-and-check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium

      - name: Build framework (copies dist into apps/www)
        run: npm run build

      - name: Serve showcase
        run: npx --yes serve apps/www -l 3333 &

      - name: Wait for server
        run: npx --yes wait-on http://127.0.0.1:3333/index.html --timeout 30000

      - name: Runtime a11y (axe-core)
        run: npm run check:a11y
